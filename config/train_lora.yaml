# RoboBrain-3DGS LoRA Fine-tuning Configuration
# Usage:
#   python train.py --config config/train_lora.yaml
#   deepspeed --num_gpus=4 train.py --config config/train_lora.yaml

# === Model ===
model:
  base_model: "/home/w50037733/models/RoboBrain2.5-8B-NV"
  num_gaussians: 1024
  sh_degree: 2
  num_gs_tokens: 64
  gs_encoder_dim: 512
  freeze_vision_encoder: true
  torch_dtype: "bfloat16"

# === Fine-tuning Mode ===
# "lora" or "full"
finetune_mode: "lora"

# === LoRA Configuration ===
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# === Prompt (Qwen3-VL chat template) ===
# Matches RoboBrain2.5's inference protocol for consistent train/test format
prompt:
  # System prompt for the chat template (set disable_system_prompt: true to omit)
  system_prompt: >-
    You are RoboBrain, an embodied AI assistant specialized in robotic
    manipulation. Given an image of a scene with 3D spatial understanding,
    provide precise affordance predictions and manipulation constraints.
  disable_system_prompt: false
  # Maximum sequence length (system+user+assistant tokens)
  # 512 is generous for affordance tasks (~200 tokens typical)
  max_seq_length: 512

# === Data ===
data:
  rlbench_root: "/home/w50037733/robobrain_3dgs/data/rlbench_sample"
  droid_root: "/home/w50037733/robobrain_3dgs/data/droid_sample"
  image_size: 256
  camera: "front"
  max_frames: -1

# === Training ===
training:
  output_dir: "/home/w50037733/robobrain_3dgs/outputs/lora"
  num_epochs: 3
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4        # LoRA adapter LR
  lr_3d_branch: 1.0e-3         # 3D branch LR (new params, higher)
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  eval_steps: 100
  seed: 42

# === Rendering Loss ===
rendering_loss:
  enabled: true
  render_size: 64
  lambda_l1: 0.8
  lambda_ssim: 0.2
  lambda_depth: 0.5
  lambda_opacity: 0.01
  weight: 0.1

# === Checkpoint ===
checkpoint:
  keep_last_n: 3            # Keep only the 3 most recent step checkpoints
                             # (best is always kept regardless)
  save_optimizer_state: true # Set false to halve checkpoint size (can't resume)

# === DeepSpeed ===
deepspeed:
  config: "/home/w50037733/robobrain_3dgs/config/deepspeed_zero2.json"
