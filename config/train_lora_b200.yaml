# RoboBrain-3DGS LoRA Fine-tuning — B200 Optimized (2x B200 192GB)
#
# Usage:
#   deepspeed --num_gpus=2 train.py --config config/train_lora_b200.yaml
#
# Memory estimate per GPU: ~47GB / 192GB (24%)
# Global batch size: 8 * 2 * 2 = 32

# === Model ===
model:
  base_model: "/home/w50037733/models/RoboBrain2.5-8B-NV"
  num_gaussians: 1024
  sh_degree: 2
  num_gs_tokens: 64
  gs_encoder_dim: 512
  freeze_vision_encoder: true
  torch_dtype: "bfloat16"

# === Fine-tuning Mode ===
finetune_mode: "lora"

# === LoRA Configuration ===
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# === Data ===
data:
  rlbench_root: "data/rlbench_sample"
  droid_root: "data/droid_sample"
  image_size: 256
  camera: "front"
  max_frames: -1

# === Training ===
training:
  output_dir: "outputs/lora_b200"
  num_epochs: 10
  per_device_batch_size: 8            # 4x larger than 5090 (192GB >> 32GB)
  gradient_accumulation_steps: 2       # global_batch = 8 * 2 * 2 = 32
  learning_rate: 2.0e-4
  lr_3d_branch: 1.0e-3
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  eval_steps: 100
  seed: 42
  use_fused_adam: true                 # FusedAdam: GPU fused kernel, ~10% faster

# === Checkpoint ===
checkpoint:
  keep_last_n: 3
  save_optimizer_state: true

# === Rendering Loss ===
rendering_loss:
  enabled: true
  render_size: 128                     # 2x larger than 5090 (better 3DGS supervision)
  lambda_l1: 0.8
  lambda_ssim: 0.2
  lambda_depth: 0.5
  lambda_opacity: 0.01
  weight: 0.1

# === DeepSpeed ===
# ZeRO-1: partition optimizer states only (sufficient for LoRA's ~37M params)
deepspeed:
  config: "config/deepspeed_zero1_b200.json"
