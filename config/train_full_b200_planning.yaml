# RoboBrain-3DGS Full Fine-tuning — Planning + idea-B (4x B200 192GB)
#
# Target hardware: 4x NVIDIA B200 (192GB HBM3e each).
# Pipeline: unified_loader (planning task) -> targets include affordance_hint
#           per step (idea B). Full fine-tune unfreezes all 36 LLM layers + lm_head;
#           use this when LoRA adapter capacity has plateaued.
#
# Usage:
#   deepspeed --num_gpus=4 train.py --config config/train_full_b200_planning.yaml
#
# Memory estimate per GPU: ~150GB / 192GB (78%)
#   - model bf16:        16GB
#   - optimizer (ZeRO-2): 96GB / 4 = 24GB
#   - gradients:         16GB
#   - activations:       ~80GB (large batch + 1280 seq + bs=4)
# Global batch size: 4 * 4 * 4 = 64

# === Model ===
model:
  base_model: "/home/edge/Embodied/models/RoboBrain2.5-8B-NV"
  num_gaussians: 1024
  sh_degree: 2
  num_gs_tokens: 64
  gs_encoder_dim: 512
  freeze_vision_encoder: true
  predict_uncertainty: true
  torch_dtype: "bfloat16"

# === Fine-tuning Mode ===
finetune_mode: "full"

# === Full Fine-tuning Configuration ===
full_finetune:
  unfreeze_llm_layers: -1              # All 36 layers
  unfreeze_lm_head: true
  gradient_checkpointing: false        # B200 has 192GB; skip checkpointing for ~30% speedup

# === Prompt (Qwen3-VL chat template) ===
prompt:
  system_prompt: >-
    You are RoboBrain, an embodied AI assistant with 3D spatial understanding
    specialized in robotic manipulation planning. Given a scene image and a
    task instruction, output a structured task decomposition with operation
    primitives and per-stage geometric constraints. Follow a 4-step reasoning
    process: 1) SCENE ANALYSIS: identify task-relevant objects and their
    spatial relations; 2) TASK DECOMPOSITION: break the task into 2-5
    operation primitives at manipulation-semantic granularity; 3) AFFORDANCE
    REASONING: for each step, name the semantic part to interact with
    (e.g. "the handle of the mug", "an empty area on the blue towel") as
    affordance_hint BEFORE predicting [u, v] coordinates; 4) CONSTRAINT
    SPECIFICATION: organize constraints by category (contact, spatial, pose,
    direction, safety) with role labels (completion, safety, progress).
    Output in compact text format starting with Scene: followed by Step N:
    action(target) lines with affordance_hint, affordance, approach,
    constraint predicates, and done_when for each step. Do NOT use markdown
    formatting.
  disable_system_prompt: false
  max_seq_length: 1280

# === Data ===
data:
  unified_root: "/home/edge/Embodied/robobrain_3dgs/data/processed"
  unified_datasets: null            # all 7 datasets after idea-B refine
  unified_task_type: "planning"
  image_size: 256
  camera: "front"
  max_frames: -1

# === Training (4x B200) ===
training:
  output_dir: "/home/edge/Embodied/robobrain_3dgs/outputs/full_planning_b200"
  num_epochs: 3
  per_device_batch_size: 4             # full FT is 2x more memory-hungry than LoRA
  gradient_accumulation_steps: 4       # global = 4 * 4 * 4 = 64
  learning_rate: 5.0e-5                # full FT: 4x lower than LoRA (whole LLM moves)
  lr_3d_branch: 1.0e-3
  weight_decay: 0.01
  warmup_ratio: 0.1                    # longer warmup for full FT stability
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  eval_steps: 200
  seed: 42
  use_fused_adam: true                 # ~10% speedup, requires DeepSpeed

# === Rendering Loss ===
rendering_loss:
  enabled: true
  render_size: 128
  lambda_l1: 0.8
  lambda_ssim: 0.2
  lambda_depth: 0.5
  lambda_opacity: 0.01
  lambda_uncertainty: 0.1
  weight: 0.1

# === Checkpoint ===
# Full FT ckpt is huge: 16GB weights + 32GB optimizer (FP32 master) = 48GB/ckpt.
# keep_last_n=2 means peak disk = 2 * 48GB + best ckpt = ~144GB.
checkpoint:
  keep_last_n: 2
  save_optimizer_state: true

# === DeepSpeed ===
# ZeRO-2: shard optimizer + gradients across 4 GPUs (no CPU offload — B200 fits).
deepspeed:
  config: "/home/edge/Embodied/robobrain_3dgs/config/deepspeed_zero2_b200.json"
